<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mi Recolección - SGRRV Huechuraba</title>
    <style>
/* ============================================
   MI RECOLECCIÓN - GITHUB PRIMER LIGHT
   ============================================ */
* { 
    margin: 0; 
    padding: 0; 
    box-sizing: border-box;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans", Helvetica, Arial, sans-serif;
}

body {
    background: #f6f8fa;
    color: #1f2328;
    min-height: 100vh;
    overflow-x: hidden;
}

/* HEADER */
.header {
    background: #ffffff;
    padding: 16px 32px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    border-bottom: 1px solid #d0d7de;
    box-shadow: 0 1px 3px rgba(31, 35, 40, 0.04);
}

.header h1 {
    font-size: 20px;
    font-weight: 600;
    color: #1f2328;
}

.header-center {
    display: flex;
    gap: 8px;
}

.filtro-btn {
    padding: 8px 16px;
    border: 1px solid #d0d7de;
    background: #ffffff;
    color: #656d76;
    border-radius: 6px;
    cursor: pointer;
    font-size: 13px;
    font-weight: 500;
    transition: all 0.15s;
}

.filtro-btn:hover {
    background: #f6f8fa;
    border-color: #1f2328;
    color: #1f2328;
}

.filtro-btn.active {
    background: #0969da;
    border-color: #0969da;
    color: #ffffff;
}

.header-info {
    text-align: right;
    font-size: 12px;
    color: #656d76;
}

.header-info .fecha {
    font-size: 14px;
    font-weight: 600;
    color: #1f2328;
}

.header-info .actualizacion {
    margin-top: 4px;
    font-size: 11px;
    color: #656d76;
}

/* CONTENEDOR PRINCIPAL */
.container {
    padding: 24px;
    display: flex;
    gap: 16px;
    height: calc(100vh - 120px);
    overflow: hidden;
}

/* COLUMNAS DE ESTADO */
.columna {
    flex: 1;
    background: #ffffff;
    border-radius: 12px;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    border: 1px solid #d0d7de;
    box-shadow: 0 1px 3px rgba(31, 35, 40, 0.04);
}

.columna-header {
    padding: 14px 16px;
    font-size: 13px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    border-bottom: 1px solid #d0d7de;
    color: #1f2328;
}

/* Colores sutiles para headers */
.columna.ingresado .columna-header { background: linear-gradient(90deg, #ddf4ff 0%, #ffffff 100%); }
.columna.para-visita .columna-header { background: linear-gradient(90deg, #fff8c5 0%, #ffffff 100%); }
.columna.programado .columna-header { background: linear-gradient(90deg, #fbefff 0%, #ffffff 100%); }
.columna.para-retiro .columna-header { background: linear-gradient(90deg, #ffebe9 0%, #ffffff 100%); }
.columna.retirado .columna-header { background: linear-gradient(90deg, #dafbe1 0%, #ffffff 100%); }
.columna.otros .columna-header { background: linear-gradient(90deg, #f6f8fa 0%, #ffffff 100%); }

.contador {
    background: #eaeef2;
    color: #656d76;
    padding: 3px 10px;
    border-radius: 20px;
    font-size: 12px;
    font-weight: 600;
}

.columna-body {
    flex: 1;
    overflow-y: auto;
    padding: 12px;
    background: #f6f8fa;
}

/* TARJETAS */
.tarjeta {
    background: #ffffff;
    border-radius: 8px;
    padding: 14px 16px;
    margin-bottom: 10px;
    border: 1px solid #d0d7de;
    border-left: 4px solid #d0d7de;
    transition: all 0.15s;
    box-shadow: 0 1px 2px rgba(31, 35, 40, 0.04);
}

.tarjeta:hover {
    border-color: #0969da;
    box-shadow: 0 4px 12px rgba(31, 35, 40, 0.08);
    transform: translateY(-1px);
}

.tarjeta.ingresado { border-left-color: #0969da; }
.tarjeta.para-visita { border-left-color: #9a6700; }
.tarjeta.programado { border-left-color: #8250df; }
.tarjeta.para-retiro { border-left-color: #cf222e; }
.tarjeta.retirado { border-left-color: #1a7f37; }
.tarjeta.otros { border-left-color: #656d76; }

.tarjeta-id {
    font-size: 11px;
    color: #656d76;
    margin-bottom: 6px;
    font-family: ui-monospace, SFMono-Regular, SF Mono, Menlo, Consolas, monospace;
}

.tarjeta-direccion {
    font-size: 14px;
    font-weight: 500;
    color: #1f2328;
    line-height: 1.4;
}

.tarjeta-tipo {
    display: inline-block;
    margin-top: 8px;
    font-size: 11px;
    padding: 3px 8px;
    background: #ddf4ff;
    color: #0969da;
    border-radius: 20px;
    font-weight: 500;
}

/* FOOTER */
.footer {
    background: #ffffff;
    padding: 14px 32px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    border-top: 1px solid #d0d7de;
}

.footer .logo {
    display: flex;
    align-items: center;
    gap: 12px;
    color: #656d76;
    font-size: 12px;
}

.footer .logo img {
    height: 32px;
    opacity: 0.8;
}

.footer .stats {
    display: flex;
    gap: 32px;
}

.footer .stat {
    text-align: center;
}

.footer .stat-valor {
    font-size: 20px;
    font-weight: 600;
    color: #0969da;
}

.footer .stat-label {
    font-size: 11px;
    color: #656d76;
    text-transform: uppercase;
    letter-spacing: 0.5px;
}

/* LOADING */
.loading {
    display: flex;
    align-items: center;
    justify-content: center;
    height: 100%;
    color: #656d76;
    font-size: 14px;
}

.loading::after {
    content: '';
    width: 20px;
    height: 20px;
    border: 2px solid #d0d7de;
    border-top-color: #0969da;
    border-radius: 50%;
    margin-left: 10px;
    animation: spin 1s linear infinite;
}

@keyframes spin {
    to { transform: rotate(360deg); }
}

/* EMPTY STATE */
.empty {
    text-align: center;
    padding: 32px;
    color: #656d76;
    font-size: 13px;
}

/* Scrollbar */
.columna-body::-webkit-scrollbar {
    width: 8px;
}
.columna-body::-webkit-scrollbar-track {
    background: #f6f8fa;
}
.columna-body::-webkit-scrollbar-thumb {
    background: #d0d7de;
    border-radius: 4px;
}
.columna-body::-webkit-scrollbar-thumb:hover {
    background: #afb8c1;
}

/* Responsive */
@media (max-width: 1200px) {
    .container {
        flex-wrap: wrap;
    }
    .columna {
        flex: 1 1 calc(33% - 12px);
        min-width: 280px;
        max-height: 350px;
    }
}

@media (max-width: 768px) {
    .columna {
        flex: 1 1 100%;
        max-height: 300px;
    }
    .header {
        flex-direction: column;
        gap: 12px;
        padding: 12px 16px;
    }
    .header h1 {
        font-size: 18px;
    }
    .header-center {
        order: 3;
    }
    .container {
        padding: 12px;
    }
    .footer {
        flex-direction: column;
        gap: 12px;
        padding: 12px 16px;
    }
}
    </style>
</head>
<body>

<div class="header">
    <h1>Mi Recolección</h1>
    <div class="header-center">
        <button class="filtro-btn active" onclick="setFiltro('hoy')">HOY</button>
        <button class="filtro-btn" onclick="setFiltro('semana')">SEMANA</button>
        <button class="filtro-btn" onclick="setFiltro('mes')">MES</button>
        <button class="filtro-btn" onclick="setFiltro('todo')">TODO</button>
    </div>
    <div class="header-info">
        <div class="fecha" id="fechaActual"></div>
        <div class="actualizacion">Actualización automática cada 5 min</div>
    </div>
</div>

<div class="container" id="container">
    <div class="columna ingresado">
        <div class="columna-header">
            Ingresado <span class="contador" id="cont-ingresado">0</span>
        </div>
        <div class="columna-body" id="col-ingresado">
            <div class="loading">Cargando</div>
        </div>
    </div>
    
    <div class="columna para-visita">
        <div class="columna-header">
            Para Visita <span class="contador" id="cont-para-visita">0</span>
        </div>
        <div class="columna-body" id="col-para-visita">
            <div class="loading">Cargando</div>
        </div>
    </div>
    
    <div class="columna programado">
        <div class="columna-header">
            Programado <span class="contador" id="cont-programado">0</span>
        </div>
        <div class="columna-body" id="col-programado">
            <div class="loading">Cargando</div>
        </div>
    </div>
    
    <div class="columna para-retiro">
        <div class="columna-header">
            Para Retiro <span class="contador" id="cont-para-retiro">0</span>
        </div>
        <div class="columna-body" id="col-para-retiro">
            <div class="loading">Cargando</div>
        </div>
    </div>
    
    <div class="columna retirado">
        <div class="columna-header">
            Retirado <span class="contador" id="cont-retirado">0</span>
        </div>
        <div class="columna-body" id="col-retirado">
            <div class="loading">Cargando</div>
        </div>
    </div>
    
    <div class="columna otros">
        <div class="columna-header">
            Otros <span class="contador" id="cont-otros">0</span>
        </div>
        <div class="columna-body" id="col-otros">
            <div class="loading">Cargando</div>
        </div>
    </div>
</div>

<div class="footer">
    <div class="logo">
        <span>SGRRV - Sistema de Gestión de Recolección de Residuos Voluminosos</span>
    </div>
    <div class="stats">
        <div class="stat">
            <div class="stat-valor" id="stat-total">0</div>
            <div class="stat-label">TOTAL</div>
        </div>
        <div class="stat">
            <div class="stat-valor" id="stat-hoy">0</div>
            <div class="stat-label">HOY</div>
        </div>
        <div class="stat">
            <div class="stat-valor" id="stat-pendientes">0</div>
            <div class="stat-label">PENDIENTES</div>
        </div>
    </div>
</div>

<script>
const API_URL = 'https://script.google.com/macros/s/AKfycbwlmWxLFq3jZD99ygE3Cy372q0rx8tZCJxmNfxTy1pxofR6IAvRbOCAdmJV9mYmYcDunQ/exec';

let filtroActual = 'hoy';
let todasLasSolicitudes = [];

// Mapeo de estados a columnas
const ESTADO_COLUMNA = {
    'INGRESADO': 'ingresado',
    'PARA VISITA': 'para-visita',
    'PROGRAMADO': 'programado',
    'PARA RETIRO': 'para-retiro',
    'RETIRO 24HRS': 'para-retiro',
    'RETIRADO': 'retirado',
    'FALLIDO': 'otros',
    'NO PROCEDE': 'otros',
    'PENDIENTE DE PAGO': 'otros'
};

// Cambiar filtro
function setFiltro(filtro) {
    filtroActual = filtro;
    document.querySelectorAll('.filtro-btn').forEach(btn => btn.classList.remove('active'));
    event.target.classList.add('active');
    renderizarDatos();
}

// Parsear fecha de forma robusta
function parsearFecha(fechaStr) {
    if (!fechaStr) return null;
    if (fechaStr instanceof Date) return fechaStr;
    let fecha = new Date(fechaStr);
    if (!isNaN(fecha.getTime())) return fecha;
    const match = String(fechaStr).match(/(\d{1,2})[-\/](\d{1,2})[-\/](\d{4})/);
    if (match) {
        fecha = new Date(match[3], match[2] - 1, match[1]);
        if (!isNaN(fecha.getTime())) return fecha;
    }
    return null;
}

// Filtrar por fecha
function filtrarPorFecha(solicitudes) {
    const ahora = new Date();
    const hoy = new Date(ahora.getFullYear(), ahora.getMonth(), ahora.getDate());
    
    return solicitudes.filter(s => {
        const fecha = parsearFecha(s.fechaIngreso);
        if (!fecha) return filtroActual === 'todo';
        
        switch (filtroActual) {
            case 'hoy':
                const fechaSolicitud = new Date(fecha.getFullYear(), fecha.getMonth(), fecha.getDate());
                return fechaSolicitud.getTime() === hoy.getTime();
            case 'semana':
                const hace7dias = new Date(hoy);
                hace7dias.setDate(hace7dias.getDate() - 7);
                return fecha >= hace7dias;
            case 'mes':
                const hace30dias = new Date(hoy);
                hace30dias.setDate(hace30dias.getDate() - 30);
                return fecha >= hace30dias;
            case 'todo':
            default:
                return true;
        }
    });
}

// Actualizar fecha
function actualizarFecha() {
    const ahora = new Date();
    const opciones = { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' };
    let fecha = ahora.toLocaleDateString('es-CL', opciones);
    fecha = fecha.charAt(0).toUpperCase() + fecha.slice(1);
    const hora = ahora.toLocaleTimeString('es-CL', { hour: '2-digit', minute: '2-digit' });
    document.getElementById('fechaActual').textContent = `${fecha} - ${hora}`;
}

// Crear tarjeta
function crearTarjeta(solicitud) {
    const id = solicitud.id || '';
    const tipo = solicitud.tipo || 'OTRO';
    const calle = solicitud.calle || '';
    const numero = solicitud.numero || '';
    const detalle = solicitud.detalleUbicacion || '';
    const estado = solicitud.estado || 'INGRESADO';
    const columna = ESTADO_COLUMNA[estado] || 'otros';
    
    const direccion = `${calle} ${numero}`.trim();
    const direccionCompleta = detalle ? `${direccion}, ${detalle}` : direccion;
    
    return `
        <div class="tarjeta ${columna}">
            <div class="tarjeta-id">${id}</div>
            <div class="tarjeta-direccion">${direccionCompleta || 'Sin dirección'}</div>
            <span class="tarjeta-tipo">${tipo}</span>
        </div>
    `;
}

// Renderizar datos filtrados
function renderizarDatos() {
    const solicitudesFiltradas = filtrarPorFecha(todasLasSolicitudes);
    
    const grupos = {
        'ingresado': [],
        'para-visita': [],
        'programado': [],
        'para-retiro': [],
        'retirado': [],
        'otros': []
    };
    
    solicitudesFiltradas.forEach(s => {
        const estado = s.estado || 'INGRESADO';
        const columna = ESTADO_COLUMNA[estado] || 'otros';
        grupos[columna].push(s);
    });
    
    Object.keys(grupos).forEach(col => {
        const container = document.getElementById(`col-${col}`);
        const contador = document.getElementById(`cont-${col}`);
        const items = grupos[col];
        
        contador.textContent = items.length;
        
        if (items.length === 0) {
            container.innerHTML = '<div class="empty">Sin solicitudes</div>';
        } else {
            container.innerHTML = items.map(s => crearTarjeta(s)).join('');
        }
    });
    
    const total = solicitudesFiltradas.length;
    const hoyStr = new Date().toISOString().slice(0, 10);
    const solicitudesHoy = todasLasSolicitudes.filter(s => {
        const fecha = parsearFecha(s.fechaIngreso);
        if (!fecha) return false;
        try {
            return fecha.toISOString().slice(0, 10) === hoyStr;
        } catch (e) {
            return false;
        }
    }).length;
    
    const pendientes = grupos['ingresado'].length + 
                      grupos['para-visita'].length + 
                      grupos['programado'].length + 
                      grupos['para-retiro'].length;
    
    document.getElementById('stat-total').textContent = total;
    document.getElementById('stat-hoy').textContent = solicitudesHoy;
    document.getElementById('stat-pendientes').textContent = pendientes;
}

// Cargar datos
async function cargarDatos() {
    try {
        const response = await fetch(API_URL, {
            method: 'POST',
            headers: { 'Content-Type': 'text/plain' },
            body: JSON.stringify({ action: 'obtenerSolicitudes' })
        });
        
        const result = await response.json();
        
        if (!result.success) {
            console.error('Error:', result.error);
            mostrarError();
            return;
        }
        
        todasLasSolicitudes = result.solicitudes || [];
        renderizarDatos();
        
    } catch (error) {
        console.error('Error cargando datos:', error);
        mostrarError();
    }
}

function mostrarError() {
    document.querySelectorAll('.columna-body').forEach(col => {
        col.innerHTML = '<div class="empty">Error de conexión. Recargar página.</div>';
    });
}

// Inicializar
actualizarFecha();
cargarDatos();

// Actualización automática cada 5 minutos
setInterval(() => {
    actualizarFecha();
    cargarDatos();
}, 5 * 60 * 1000);

// Actualizar reloj cada minuto
setInterval(actualizarFecha, 60 * 1000);
</script>

</body>
</html>
