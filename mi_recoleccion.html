<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Big Mac - Monitor SGRRV</title>
    <style>
/* ============================================
   BIG MAC v4 - MONITOR SGRRV EN VIVO
   Conectado a API Google Apps Script
   Actualización cada 5 minutos
   ============================================ */

:root {
    /* === FONDOS === */
    --bgColor-default: #0d1117;
    --bgColor-muted: #161b22;
    --bgColor-inset: #010409;
    
    /* === TEXTOS === */
    --fgColor-default: #e6edf3;
    --fgColor-muted: #8b949e;
    --fgColor-subtle: #6e7681;
    --fgColor-onEmphasis: #ffffff;
    
    /* === BORDES === */
    --borderColor-default: #30363d;
    --borderColor-muted: #21262d;
    
    /* === SEMANTICOS === */
    --accent-fg: #58a6ff;
    --danger-fg: #f85149;
    --success-fg: #3fb950;
    --attention-fg: #d29922;
    
    /* === RADIO === */
    --radius-1: 6px;
}

* {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans", Helvetica, Arial, sans-serif;
    font-size: 14px;
    box-sizing: border-box;
    margin: 0;
    padding: 0;
}

body {
    background: var(--bgColor-default);
    color: var(--fgColor-default);
    min-height: 100vh;
}

/* === HEADER === */
.header {
    background: var(--bgColor-muted);
    padding: 12px 24px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    border-bottom: 1px solid var(--borderColor-default);
}

.header-left h1 {
    font-size: 18px;
    font-weight: 600;
    color: var(--fgColor-default);
}

.header-left h1 span {
    color: var(--attention-fg);
}

.header-left .subtitulo {
    font-size: 12px;
    color: var(--fgColor-muted);
    display: block;
    margin-top: 2px;
}

.header-right {
    display: flex;
    align-items: center;
    gap: 32px;
}

.header-stat {
    text-align: center;
}

.header-stat .valor {
    font-size: 24px;
    font-weight: 600;
    color: var(--fgColor-default);
}

.header-stat .label {
    font-size: 11px;
    color: var(--fgColor-muted);
    text-transform: uppercase;
    letter-spacing: 0.5px;
}

.header-stat.stat-warning .valor { color: var(--accent-fg); }
.header-stat.stat-danger .valor { color: var(--danger-fg); }

.update-info {
    text-align: right;
    font-size: 12px;
    color: var(--fgColor-subtle);
}

.update-info .tiempo {
    font-family: ui-monospace, SFMono-Regular, SF Mono, Menlo, Consolas, monospace;
    color: var(--fgColor-muted);
}

.update-info .updating {
    color: var(--success-fg);
    opacity: 0;
    transition: opacity 0.3s;
}

.update-info .updating.visible {
    opacity: 1;
}

/* === BOARD === */
.board {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 12px;
    padding: 16px;
    height: calc(100vh - 72px);
    overflow: hidden;
}

/* === COLUMNAS === */
.columna {
    background: var(--bgColor-muted);
    border: 1px solid var(--borderColor-default);
    border-radius: var(--radius-1);
    display: flex;
    flex-direction: column;
    overflow: hidden;
}

.columna-header {
    padding: 12px 16px;
    border-bottom: 1px solid var(--borderColor-default);
    display: flex;
    justify-content: space-between;
    align-items: center;
}

.columna-titulo {
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    color: var(--fgColor-muted);
}

.columna-count {
    font-size: 14px;
    font-weight: 600;
    color: var(--fgColor-muted);
    background: var(--bgColor-default);
    min-width: 28px;
    height: 24px;
    display: flex;
    align-items: center;
    justify-content: center;
    border-radius: var(--radius-1);
}

/* === LISTA DE TARJETAS === */
.columna-body {
    flex: 1;
    overflow-y: auto;
    padding: 8px;
}

.columna-body::-webkit-scrollbar {
    width: 4px;
}
.columna-body::-webkit-scrollbar-track {
    background: transparent;
}
.columna-body::-webkit-scrollbar-thumb {
    background: var(--borderColor-default);
    border-radius: 2px;
}

.columna-empty {
    text-align: center;
    padding: 20px;
    color: var(--fgColor-subtle);
    font-size: 12px;
}

/* === TARJETAS === */
.tarjeta {
    background: var(--bgColor-default);
    border: 1px solid var(--borderColor-default);
    border-radius: var(--radius-1);
    padding: 10px 12px;
    margin-bottom: 8px;
    transition: border-color 0.15s;
}

.tarjeta:hover {
    border-color: var(--fgColor-subtle);
}

.tarjeta-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 6px;
}

.tarjeta-id {
    font-size: 13px;
    font-weight: 600;
    font-family: ui-monospace, SFMono-Regular, SF Mono, Menlo, Consolas, monospace;
}

.tarjeta-tipo {
    font-size: 10px;
    font-weight: 500;
    text-transform: uppercase;
    color: var(--fgColor-subtle);
}

.tarjeta-direccion {
    font-size: 12px;
    margin-bottom: 6px;
    line-height: 1.4;
}

.tarjeta-footer {
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-size: 11px;
}

.tarjeta-tiempo {
    color: var(--fgColor-subtle);
}

.tarjeta-info {
    color: var(--fgColor-subtle);
}

/* === ESTADOS === */

/* Estado A - Normal (gris bajo perfil) */
.estado-a .tarjeta-id,
.estado-a .tarjeta-direccion,
.estado-a .tarjeta-tipo,
.estado-a .tarjeta-tiempo,
.estado-a .tarjeta-info {
    color: var(--fgColor-muted);
}

/* Estado B - Riesgo (azul parpadeo) */
.estado-b .tarjeta-id,
.estado-b .tarjeta-direccion {
    color: var(--accent-fg);
    animation: parpadeo 1.5s ease-in-out infinite;
}

.estado-b .tarjeta-tipo,
.estado-b .tarjeta-tiempo,
.estado-b .tarjeta-info {
    color: var(--accent-fg);
    opacity: 0.7;
}

@keyframes parpadeo {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.4; }
}

/* Estado C - Incumplimiento (rojo solido) */
.estado-c {
    border-color: var(--danger-fg) !important;
}

.estado-c .tarjeta-id,
.estado-c .tarjeta-direccion {
    color: var(--danger-fg);
}

.estado-c .tarjeta-tipo,
.estado-c .tarjeta-tiempo,
.estado-c .tarjeta-info {
    color: var(--danger-fg);
    opacity: 0.8;
}

/* === LOADING === */
.loading {
    display: flex;
    align-items: center;
    justify-content: center;
    height: 100%;
    color: var(--fgColor-muted);
}

.loading-spinner {
    width: 24px;
    height: 24px;
    border: 2px solid var(--borderColor-default);
    border-top-color: var(--accent-fg);
    border-radius: 50%;
    animation: spin 1s linear infinite;
    margin-right: 10px;
}

@keyframes spin {
    to { transform: rotate(360deg); }
}

/* === RESPONSIVE === */
@media (max-width: 1200px) {
    .board {
        grid-template-columns: repeat(2, 1fr);
        height: auto;
    }
    .columna {
        min-height: 300px;
    }
}

@media (max-width: 600px) {
    .board {
        grid-template-columns: 1fr;
    }
    .header {
        flex-direction: column;
        gap: 12px;
    }
    .header-right {
        width: 100%;
        justify-content: space-between;
    }
}
</style>
</head>
<body>

<div class="header">
    <div class="header-left">
        <h1>🍔 <span>Big Mac</span> Monitor</h1>
        <span class="subtitulo">SGRRV Huechuraba - En vivo</span>
    </div>
    <div class="header-right">
        <div class="header-stat">
            <div class="valor" id="totalActivos">-</div>
            <div class="label">Activos</div>
        </div>
        <div class="header-stat stat-warning">
            <div class="valor" id="totalRiesgo">-</div>
            <div class="label">En riesgo</div>
        </div>
        <div class="header-stat stat-danger">
            <div class="valor" id="totalIncumplidos">-</div>
            <div class="label">Incumplidos</div>
        </div>
        <div class="update-info">
            <div>Próxima actualización</div>
            <div class="tiempo" id="countdown">05:00</div>
            <div class="updating" id="updating">Actualizando...</div>
        </div>
    </div>
</div>

<div class="board">
    <!-- C1: Solicitudes de Retiro -->
    <div class="columna">
        <div class="columna-header">
            <span class="columna-titulo">Solicitudes de Retiro</span>
            <span class="columna-count" id="count-c1">0</span>
        </div>
        <div class="columna-body" id="col-c1">
            <div class="loading"><div class="loading-spinner"></div> Cargando...</div>
        </div>
    </div>
    
    <!-- C2: Visita Factibilidad -->
    <div class="columna">
        <div class="columna-header">
            <span class="columna-titulo">Visita Factibilidad</span>
            <span class="columna-count" id="count-c2">0</span>
        </div>
        <div class="columna-body" id="col-c2">
            <div class="loading"><div class="loading-spinner"></div> Cargando...</div>
        </div>
    </div>
    
    <!-- C3: Asignación de Rutas -->
    <div class="columna">
        <div class="columna-header">
            <span class="columna-titulo">Asignación de Rutas</span>
            <span class="columna-count" id="count-c3">0</span>
        </div>
        <div class="columna-body" id="col-c3">
            <div class="loading"><div class="loading-spinner"></div> Cargando...</div>
        </div>
    </div>
    
    <!-- C4: Cerradas Hoy -->
    <div class="columna">
        <div class="columna-header">
            <span class="columna-titulo">Cerradas Hoy</span>
            <span class="columna-count" id="count-c4">0</span>
        </div>
        <div class="columna-body" id="col-c4">
            <div class="loading"><div class="loading-spinner"></div> Cargando...</div>
        </div>
    </div>
</div>

<script>
// =====================================================
// CONFIGURACIÓN
// =====================================================

const CONFIG = {
    intervaloActualizacion: 300, // 5 minutos en segundos
    horasRiesgo: 4,              // Horas laborales para estado B (azul)
    horasIncumplimiento: 8,      // Horas laborales para estado C (rojo)
    horaInicio: 8,               // Inicio jornada laboral
    horaFin: 18                  // Fin jornada laboral
};

// API del SGRRV
const API_URL = 'https://script.google.com/macros/s/AKfycbwlmWxLFq3jZD99ygE3Cy372q0rx8tZCJxmNfxTy1pxofR6IAvRbOCAdmJV9mYmYcDunQ/exec';

// =====================================================
// LLAMADA A LA API
// =====================================================

async function obtenerSolicitudes() {
    try {
        const response = await fetch(API_URL + '?action=obtenerSolicitudes');
        const data = await response.json();
        
        if (data.success) {
            return data.solicitudes || [];
        }
        console.error('Error API:', data.error);
        return [];
    } catch (error) {
        console.error('Error de conexión:', error);
        return [];
    }
}

// =====================================================
// CLASIFICACIÓN POR ESTADO
// =====================================================

function clasificarSolicitudes(solicitudes) {
    const ahora = new Date();
    
    const c1 = []; // INGRESADO - Esperando visita
    const c2 = []; // PARA VISITA, VISITADO - En proceso de visita
    const c3 = []; // PARA RETIRO, RETIRO 24HRS, PROGRAMADO - Asignación/Retiro
    const c4 = []; // RETIRADO - Cerradas hoy
    
    const hoy = ahora.toDateString();
    
    solicitudes.forEach(s => {
        const estado = s.estado || 'INGRESADO';
        
        switch(estado) {
            case 'INGRESADO':
                c1.push({
                    ...s,
                    timestamp: s.fechaIngreso
                });
                break;
                
            case 'PARA VISITA':
            case 'VISITADO':
            case 'PENDIENTE':
                c2.push({
                    ...s,
                    timestamp: s.fechaIngreso
                });
                break;
                
            case 'PARA RETIRO':
            case 'RETIRO 24HRS':
            case 'PROGRAMADO':
                c3.push({
                    ...s,
                    timestamp: s.fechaIngreso
                });
                break;
                
            case 'RETIRADO':
                // Solo mostrar los cerrados hoy
                // (En producción, filtrar por fechaCierre)
                c4.push(s);
                break;
        }
    });
    
    return { c1, c2, c3, c4 };
}

// =====================================================
// CÁLCULO DE HORAS LABORALES
// =====================================================

function esFinDeSemana(fecha) {
    const dia = fecha.getDay();
    return dia === 0 || dia === 6;
}

function calcularHorasLaborales(desde, hasta) {
    let horas = 0;
    let cursor = new Date(desde);
    
    while (cursor < hasta) {
        if (!esFinDeSemana(cursor)) {
            const hora = cursor.getHours();
            if (hora >= CONFIG.horaInicio && hora < CONFIG.horaFin) {
                horas++;
            }
        }
        cursor.setHours(cursor.getHours() + 1);
    }
    
    return horas;
}

function obtenerEstado(timestamp, ahora) {
    if (!timestamp) return 'a';
    
    const desde = new Date(timestamp);
    if (isNaN(desde.getTime())) return 'a';
    
    const horasLaborales = calcularHorasLaborales(desde, ahora);
    
    if (horasLaborales >= CONFIG.horasIncumplimiento) {
        return 'c';
    } else if (horasLaborales >= CONFIG.horasRiesgo) {
        return 'b';
    }
    return 'a';
}

// =====================================================
// RENDERIZADO
// =====================================================

function formatearTiempo(timestamp) {
    if (!timestamp) return '-';
    
    const fecha = new Date(timestamp);
    if (isNaN(fecha.getTime())) return '-';
    
    const ahora = new Date();
    const hoy = ahora.toDateString();
    const ayer = new Date(ahora);
    ayer.setDate(ayer.getDate() - 1);
    
    if (fecha.toDateString() === hoy) {
        return 'Hoy ' + fecha.getHours().toString().padStart(2, '0') + ':' + 
               fecha.getMinutes().toString().padStart(2, '0');
    } else if (fecha.toDateString() === ayer.toDateString()) {
        return 'Ayer ' + fecha.getHours().toString().padStart(2, '0') + ':' + 
               fecha.getMinutes().toString().padStart(2, '0');
    }
    return fecha.getDate() + '/' + (fecha.getMonth() + 1);
}

function generarTarjeta(item, estado, infoExtra = '') {
    const idCorto = item.id ? item.id.split('-').pop() : '?';
    const direccion = item.direccion || (item.calle + ' ' + item.numero) || '-';
    const tipo = item.tipo || '-';
    
    return `
        <div class="tarjeta estado-${estado}">
            <div class="tarjeta-header">
                <span class="tarjeta-id">${idCorto}</span>
                <span class="tarjeta-tipo">${tipo}</span>
            </div>
            <div class="tarjeta-direccion">${direccion}</div>
            <div class="tarjeta-footer">
                <span class="tarjeta-tiempo">${infoExtra}</span>
            </div>
        </div>
    `;
}

function renderizarColumna(colId, datos, ahora) {
    const container = document.getElementById('col-' + colId);
    const countEl = document.getElementById('count-' + colId);
    
    if (datos.length === 0) {
        container.innerHTML = '<div class="columna-empty">Sin casos</div>';
        countEl.textContent = '0';
        return { a: 0, b: 0, c: 0 };
    }
    
    let htmlItems = [];
    let contadores = { a: 0, b: 0, c: 0 };
    
    datos.forEach(item => {
        const estado = obtenerEstado(item.timestamp, ahora);
        contadores[estado]++;
        const info = formatearTiempo(item.timestamp);
        htmlItems.push(generarTarjeta(item, estado, info));
    });
    
    container.innerHTML = htmlItems.join('');
    countEl.textContent = datos.length;
    
    return contadores;
}

function renderizarC4(datos) {
    const container = document.getElementById('col-c4');
    const countEl = document.getElementById('count-c4');
    
    if (datos.length === 0) {
        container.innerHTML = '<div class="columna-empty">Sin cierres hoy</div>';
        countEl.textContent = '0';
        return;
    }
    
    container.innerHTML = datos.slice(0, 20).map(item => {
        const idCorto = item.id ? item.id.split('-').pop() : '?';
        const direccion = item.direccion || (item.calle + ' ' + item.numero) || '-';
        const tipo = item.tipo || '-';
        
        return `
            <div class="tarjeta">
                <div class="tarjeta-header">
                    <span class="tarjeta-id">${idCorto}</span>
                    <span class="tarjeta-tipo">${tipo}</span>
                </div>
                <div class="tarjeta-direccion">${direccion}</div>
                <div class="tarjeta-footer">
                    <span class="tarjeta-tiempo" style="color: var(--success-fg);">✓ Cerrado</span>
                </div>
            </div>
        `;
    }).join('');
    
    countEl.textContent = datos.length;
}

async function renderizarTablero() {
    const solicitudes = await obtenerSolicitudes();
    const { c1, c2, c3, c4 } = clasificarSolicitudes(solicitudes);
    const ahora = new Date();
    
    let totalB = 0;
    let totalC = 0;
    
    // C1: Solicitudes de Retiro (INGRESADO)
    const contC1 = renderizarColumna('c1', c1, ahora);
    totalB += contC1.b;
    totalC += contC1.c;
    
    // C2: Visita Factibilidad (PARA VISITA, VISITADO)
    const contC2 = renderizarColumna('c2', c2, ahora);
    totalB += contC2.b;
    totalC += contC2.c;
    
    // C3: Asignación de Rutas (PARA RETIRO, RETIRO 24HRS, PROGRAMADO)
    const contC3 = renderizarColumna('c3', c3, ahora);
    totalB += contC3.b;
    totalC += contC3.c;
    
    // C4: Cerradas
    renderizarC4(c4);
    
    // Actualizar KPIs
    const activos = c1.length + c2.length + c3.length;
    document.getElementById('totalActivos').textContent = activos;
    document.getElementById('totalRiesgo').textContent = totalB;
    document.getElementById('totalIncumplidos').textContent = totalC;
}

// =====================================================
// COUNTDOWN Y AUTO-ACTUALIZACIÓN
// =====================================================

let segundosRestantes = CONFIG.intervaloActualizacion;

function actualizarCountdown() {
    const minutos = Math.floor(segundosRestantes / 60);
    const segundos = segundosRestantes % 60;
    document.getElementById('countdown').textContent = 
        String(minutos).padStart(2, '0') + ':' + String(segundos).padStart(2, '0');
    
    if (segundosRestantes <= 0) {
        // Mostrar indicador de actualización
        document.getElementById('updating').classList.add('visible');
        
        // Actualizar datos
        renderizarTablero().then(() => {
            setTimeout(() => {
                document.getElementById('updating').classList.remove('visible');
            }, 1000);
        });
        
        // Reiniciar contador
        segundosRestantes = CONFIG.intervaloActualizacion;
    } else {
        segundosRestantes--;
    }
}

// =====================================================
// INICIALIZAR
// =====================================================

document.addEventListener('DOMContentLoaded', function() {
    // Cargar datos inicial
    renderizarTablero();
    
    // Iniciar countdown
    setInterval(actualizarCountdown, 1000);
});
</script>

</body>
</html>
